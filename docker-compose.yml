version: '3.8'

services:
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: ../Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=development
    networks:
      - securemesh

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: ../Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=development
    networks:
      - securemesh
    depends_on:
      - auth-service

  order-service:
    build:
      context: ./backend/order-service
      dockerfile: ../Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=development
    networks:
      - securemesh
    depends_on:
      - auth-service

  payment-service:
    build:
      context: ./backend/payment-service
      dockerfile: ../Dockerfile
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=development
    networks:
      - securemesh
    depends_on:
      - auth-service

networks:
  securemesh:
    driver: bridge
